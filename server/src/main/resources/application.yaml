server:
  port: 8080
  servlet:
    context-path: /quan-ly-vua-ca


spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
#    hikari:
#      maximum-pool-size: 20
#      minimum-idle: 5
#      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        # Dòng này quan trọng: Bắt Hibernate dùng đúng tên trong @Column, không tự sửa thành snake_case
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  signerKey: ${SIGNER_KEY}
  valid-duration: 43200
  refreshable-duration: 604800

# Mặc định cho production (Render): FE và BE khác domain (cross-site) nên
# bắt buộc Secure=true + SameSite=None thì trình duyệt mới gửi cookie kèm request.
# application-local.yaml override lại thành false/Lax để chạy http://localhost.
cookie:
  secure: true
  same-site: None

vnpay:
  tmn-code: ${TMN_CODE}
  hash-secret: ${HASH_SECRET}
  base-url: ${BASE_URL}
  return-url: ${RETURN_URL}
  version: 2.1.0
  command: pay
  curr-code: VND
  locale: vn

timezone:
  id: Asia/Ho_Chi_Minh

cong-no:
  phan-tram-canh-bao: 80
  so-ngay-khoa: 30

springdoc:
  swagger-ui:
    path: ${SWAGGER_UI}
  api-docs:
    path: ${API_DOCS}

frontend:
  url: ${FRONTEND_URL}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}